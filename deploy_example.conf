# Required values
environment=staging
stack_name=my-stack
template_file=cloudformation.yaml
parameter_file=params/staging.json
set_param=ImageTag=1.2.3
set_param=LogLevel=debug

# Optional values
assume_role_arn=arn:aws:iam::123456789012:role/DeploymentAutomation
cloudformation_role_arn=arn:aws:iam::123456789012:role/CloudFormationExecutionRole
region=eu-central-1
profile=default
capabilities=CAPABILITY_NAMED_IAM

# Boolean values
dry_run=false
no_assume_role=false

# Repeatable values
tag=app=my-service
tag=env=staging
tag=owner=platform-team

extra_arg=--debug